<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F4F2EB">
<title>♟ Blunder Trainer — Ophir</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
  :root{
    /* Researched palette:
       - board = chess.com tournament green (train on the colors you play on → pattern transfer; the green/buff scheme is the OTB eye-strain standard)
       - light "paper" backdrop by default (Ophir's preference), dark theme via the header toggle
       - green = success & primary action · orange = streaks/rewards only (loss-aversion accent) · soft red = errors, briefly · blue = hints/info */
    --bg:#F4F2EB; --card:#FFFFFF; --border:#E3E0D5;
    --green:#81B64C; --green-deep:#5C8A33; --num:#5C8A33;
    --gold:#D98E04; --red:#CC4B33; --blue:#2E7CB8;
    --text:#26292E; --muted:#737A85;
    --chip-bg:#E9F0F7; --chip-coral-bg:#F9E7E2; --chip-gold-bg:#F7EDD6;
    --ghost-bg:#ECE9DF; --ghost-shadow:#D5D2C7;
    --card-shadow:0 1px 3px rgba(40,40,30,.07);
    --light-sq:#EEEED2; --dark-sq:#769656;
  }
  html[data-theme="dark"]{
    --bg:#0E141B; --card:#18202B; --border:#243042;
    --green:#81B64C; --green-deep:#5C8A33; --num:#A3D160;
    --gold:#F5A623; --red:#E0573F; --blue:#54A9E0;
    --text:#ECEFF4; --muted:#8B95A5;
    --chip-bg:#223041; --chip-coral-bg:#332220; --chip-gold-bg:#332A18;
    --ghost-bg:#243042; --ghost-shadow:#101720;
    --card-shadow:none;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; padding-bottom:40px;
    -webkit-tap-highlight-color:transparent;
  }
  header{padding:20px 16px 4px; max-width:960px; margin:0 auto;
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  header h1{font-size:1.35rem; letter-spacing:.3px;}
  .theme-toggle{
    background:var(--card); border:1px solid var(--border); border-radius:50%;
    width:38px; height:38px; font-size:1.05rem; cursor:pointer; flex-shrink:0;
    box-shadow:var(--card-shadow);
  }
  header p{color:var(--muted); font-size:.85rem; margin-top:2px;}
  nav{
    display:flex; gap:4px; max-width:960px; margin:14px auto 0; padding:0 16px;
    border-bottom:1px solid var(--border); overflow-x:auto;
  }
  nav button{
    background:none; border:none; color:var(--muted); font-size:.92rem; font-weight:600;
    padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
    transition:color .15s;
  }
  nav button .ico{display:none;}
  nav button.active{color:var(--num); border-bottom-color:var(--green);}
  nav button:hover{color:var(--text);}
  main{max-width:960px; margin:0 auto; padding:18px 16px;}
  .card{background:var(--card); border-radius:14px; padding:18px; border:1px solid var(--border); box-shadow:var(--card-shadow);}
  .grid{display:grid; gap:14px;}
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
  .stat .num{font-size:1.7rem; font-weight:700; color:var(--num);}
  .stat .num.flame{color:var(--gold);}
  .stat .lbl{color:var(--muted); font-size:.78rem; margin-top:3px; text-transform:uppercase; letter-spacing:.6px;}
  .badge{
    display:inline-block; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:.78rem; padding:3px 9px; border-radius:6px; background:var(--chip-bg); color:var(--blue);
  }
  .badge.coral{color:var(--red); background:var(--chip-coral-bg);}
  .badge.gold{color:var(--gold); background:var(--chip-gold-bg);}
  .btn{
    display:inline-block; background:var(--green); color:#FFFFFF; border:none; border-radius:10px;
    font-weight:800; font-size:.95rem; padding:13px 22px; cursor:pointer;
    transition:transform .1s, opacity .15s; box-shadow:0 3px 0 var(--green-deep);
    text-shadow:0 1px 1px rgba(0,0,0,.18);
  }
  .btn:hover{opacity:.92; transform:translateY(-1px);}
  .btn:active{transform:translateY(1px); box-shadow:0 1px 0 var(--green-deep);}
  .btn.ghost{background:var(--ghost-bg); color:var(--text); box-shadow:0 3px 0 var(--ghost-shadow); text-shadow:none;}
  .btn.coral{background:var(--gold); color:#FFFFFF; box-shadow:0 3px 0 #A8731A;}
  .btn:disabled{opacity:.4; cursor:default;}
  h2{font-size:1.05rem; margin-bottom:12px;}
  /* ---------- board ---------- */
  #board-wrap{display:flex; flex-direction:column; align-items:center;}
  #board{
    display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
    width:min(94vw,460px); height:min(94vw,460px); border-radius:6px; overflow:hidden;
    box-shadow:0 10px 34px rgba(0,0,0,.5), 0 0 0 1px rgba(129,182,76,.25);
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  .sq{
    display:flex; align-items:center; justify-content:center; position:relative;
    cursor:pointer; transition:background .12s;
  }
  .sq.light{background:var(--light-sq);}
  .sq.dark{background:var(--dark-sq);}
  .sq .pc{
    width:92%; height:92%; pointer-events:none;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.3));
  }
  .pc.pop{animation:pop .28s cubic-bezier(.2,1.4,.5,1);}
  @keyframes pop{from{transform:scale(.55); opacity:.3;} to{transform:scale(1); opacity:1;}}
  .sq .coord{
    position:absolute; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:clamp(8px,calc(min(94vw,460px)/42),12px); font-weight:700;
    pointer-events:none; line-height:1; opacity:.9;
  }
  .sq .coord.file{bottom:3px; right:4px;}
  .sq .coord.rank{top:3px; left:4px;}
  .sq.light .coord{color:#769656;}
  .sq.dark .coord{color:#EEEED2;}
  /* chess.com-style yellow selection/last-move tints — familiar = zero relearning */
  .sq.sel.light, .sq.lastmove.light{background:#F6F669;}
  .sq.sel.dark, .sq.lastmove.dark{background:#BACA2B;}
  .sq.best-dest{box-shadow:inset 0 0 0 3px var(--green), inset 0 0 20px rgba(129,182,76,.5);}
  .sq.mymove{box-shadow:inset 0 0 0 3px rgba(224,87,63,.85), inset 0 0 18px rgba(224,87,63,.35);}
  .sq .dot{
    position:absolute; width:30%; height:30%; border-radius:50%;
    background:radial-gradient(circle, rgba(14,20,27,.45), rgba(14,20,27,.32));
    pointer-events:none;
  }
  .sq.cap-target .dot{width:92%; height:92%; background:none; border:3.5px solid rgba(14,20,27,.4); border-radius:50%;}
  .board-meta{display:flex; justify-content:flex-end; width:min(94vw,460px);
    color:var(--muted); font-size:.7rem; font-family:ui-monospace,monospace; padding:4px 4px 0;}
  /* ---------- drill ---------- */
  .drill-ctx{margin-bottom:12px;}
  .drill-ctx .opening{color:var(--muted); font-size:.82rem;}
  .drill-ctx .task{font-size:1rem; margin-top:6px; line-height:1.45;}
  .drill-ctx .task strong{color:#F08A76;}
  .tries{display:inline-flex; gap:5px; vertical-align:middle; margin-left:8px;}
  .tries .pip{width:9px; height:9px; border-radius:50%; background:var(--ghost-bg); border:1px solid var(--border); display:inline-block;}
  .tries .pip.used{background:var(--red);}
  .feedback{
    margin-top:14px; padding:14px 16px; border-radius:12px; font-size:1.02rem; line-height:1.55;
    animation:fadein .25s ease;
  }
  .feedback.good{background:rgba(129,182,76,.13); border:1px solid rgba(129,182,76,.45);}
  .feedback.bad{background:rgba(224,87,63,.10); border:1px solid rgba(224,87,63,.4);}
  .feedback.info{background:rgba(84,169,224,.10); border:1px solid rgba(84,169,224,.4);}
  .feedback .verdict{font-weight:700; margin-bottom:6px; font-size:1.05rem;}
  @keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
  .drill-foot{
    display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:14px;
    color:var(--muted); font-size:.82rem;
  }
  .drill-foot .spacer{flex:1;}
  .drill-actions{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  /* ---------- themes ---------- */
  .theme-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
  .theme-card{cursor:pointer; transition:transform .12s, border-color .15s;}
  .theme-card:hover{transform:translateY(-2px); border-color:var(--green);}
  .theme-card .ico{font-size:1.6rem;}
  .theme-card h3{font-size:.95rem; margin:8px 0 4px;}
  .theme-card .meta{color:var(--muted); font-size:.8rem; line-height:1.5;}
  .theme-card .acc{font-weight:700; color:var(--num);}
  /* ---------- progress ---------- */
  svg text{fill:var(--muted); font-size:10px; font-family:ui-monospace,monospace;}
  svg line{stroke:var(--border);}
  .chart-card{overflow-x:auto;}
  a{color:var(--blue);}
  .hidden{display:none !important;}
  /* ---------- mobile: app-style bottom tab bar + thumb-sized targets ---------- */
  @media (max-width:640px){
    body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}
    header{padding:14px 14px 0;}
    header h1{font-size:1.15rem;}
    header p{font-size:.78rem;}
    main{padding:12px 10px;}
    .card{padding:13px; border-radius:12px;}
    .stat-grid{grid-template-columns:repeat(2,1fr); gap:10px;}
    .stat .num{font-size:1.3rem;}
    nav{
      position:fixed; bottom:0; left:0; right:0; z-index:50; margin:0;
      background:var(--card); border-top:1px solid var(--border); border-bottom:none;
      padding:6px 4px calc(6px + env(safe-area-inset-bottom)); gap:0;
      justify-content:space-around; max-width:none;
    }
    nav button{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
      font-size:.68rem; padding:6px 2px; border-bottom:none; border-radius:10px;
    }
    nav button .ico{display:block; font-size:1.25rem; line-height:1;}
    nav button.active{color:var(--num); background:rgba(129,182,76,.14);}
    .btn{padding:14px 16px; font-size:.95rem; width:100%; text-align:center;}
    .drill-actions .btn{flex:1; width:auto;}
    #board{width:calc(100vw - 48px); height:calc(100vw - 48px); max-width:460px; max-height:460px;}
    .board-meta{width:calc(100vw - 48px); max-width:460px;}
    .feedback{font-size:.95rem; padding:12px 13px;}
    .drill-foot{font-size:.75rem;}
    .theme-grid{grid-template-columns:repeat(2,1fr); gap:10px;}
  }
</style>
</head>

 Mistake","difficulty":"Hard","explanation":"g6 was the move \u2014 it keeps your pieces coordinated and avoids the tactic that punished your game move. In the game, Nf6 ran into Qxf7#, costing about 20.3 pawns of advantage.","hintPiece":"Pawn","opening":"Kings Pawn Opening 1...e5","color":"Black","title":"vs sid543643 (Blitz) \u2014 Loss","date":"2026-05-08","link":"https://www.chess.com/game/live/168433431954"}]</script>
<script>
/* ============================================================
   Data layer — the drill bank lives in data/trainer-drills.json and is
   regenerated by sync_trainer.py as new games are played. The inline
   <script id="drill-data"> block is a fallback for offline/local use.
   ============================================================ */
let DRILLS = [];
let ANALYSIS = {gamesAnalyzed: 0, totalBlunders: 0, topTheme: "—",
                weakestOpening: "—", themeOrder: [], midgamePct: 0, generated: null};

function adoptPayload(payload){
  DRILLS = payload.drills.map(d => ({...d, key: d.fen + "|" + d.bestUci}));
  ANALYSIS = {
    gamesAnalyzed: payload.gamesAnalyzed,
    totalBlunders: DRILLS.length,
    topTheme: payload.stats.topTheme,
    topThemeCount: payload.stats.themes[payload.stats.topTheme] || 0,
    weakestOpening: payload.stats.weakestOpening,
    themeOrder: payload.stats.themeOrder,
    midgamePct: payload.stats.midgamePct,
    generated: payload.generated,
  };
}

function adoptLegacy(drills){
  DRILLS = drills.map(d => ({...d, accept: d.accept || [d.bestUci], key: d.fen + "|" + d.bestUci}));
  const counts = {};
  DRILLS.forEach(d => counts[d.theme] = (counts[d.theme]||0)+1);
  const order = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const mid = DRILLS.filter(d => d.moveNum >= 11 && d.moveNum <= 25).length;
  ANALYSIS = {gamesAnalyzed: 46, totalBlunders: DRILLS.length,
    topTheme: order[0]||"—", topThemeCount: counts[order[0]]||0,
    weakestOpening: "Caro-Kann Defense (17% over 6 games)", themeOrder: order,
    midgamePct: Math.round(100*mid/DRILLS.length), generated: null};
}

async function boot(){
  try{
    const r = await fetch("data/trainer-drills.json?ts=" + Date.now(), {cache: "no-store"});
    if(!r.ok) throw new Error("HTTP " + r.status);
    adoptPayload(await r.json());
  }catch(e){
    adoptLegacy(JSON.parse(document.getElementById('drill-data').textContent));
  }
  renderDashboard();
}
const THEME_ICONS = {
  "Hung Piece":"🫳","Calculation Error":"🧮","Opening Mistake":"📖",
  "Endgame":"🏁","Missed Tactic":"⚡","Fork":"🍴","Mate Pattern":"🏰","Pin":"📌","Skewer":"🔗"
};

/* ---------- persistent state (localStorage so streaks/progress survive reloads) ---------- */
const store = {
  load(){ try{ return JSON.parse(localStorage.getItem("blunderTrainer")||"{}"); }catch(e){ return {}; } },
  save(s){ localStorage.setItem("blunderTrainer", JSON.stringify(s)); }
};
let S = Object.assign({
  attempts: [],            // {key, theme, correct, date, firstTry}
  sessions: [],            // {date, correct, total}
  srs: {},                 // key -> {due: "YYYY-MM-DD", interval: days, seen: n}
}, store.load());
if(!S.srs) S.srs = {};

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(n){ const d = new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

/* Spaced repetition: miss → due tomorrow; solve → interval triples (3, 9, 27 days). */
function srsUpdate(key, correct){
  const cur = S.srs[key] || {interval: 0, seen: 0};
  const interval = correct ? Math.min((cur.interval || 1) * 3, 60) : 1;
  S.srs[key] = {due: addDays(interval), interval, seen: cur.seen + 1};
}

function recordAttempt(key, theme, correct, firstTry){
  S.attempts.push({key, theme, correct, firstTry, date: todayStr()});
  let cur = S.sessions[S.sessions.length-1];
  if(!cur || cur.date !== todayStr()){ cur = {date: todayStr(), correct:0, total:0}; S.sessions.push(cur); }
  if(firstTry){ cur.total++; if(correct) cur.correct++; srsUpdate(key, correct); }
  store.save(S);
}
function overallAccuracy(){
  const f = S.attempts.filter(a=>a.firstTry);
  if(!f.length) return null;
  return Math.round(100 * f.filter(a=>a.correct).length / f.length);
}
function themeAccuracy(theme){
  const f = S.attempts.filter(a=>a.firstTry && a.theme===theme);
  if(!f.length) return null;
  return Math.round(100 * f.filter(a=>a.correct).length / f.length);
}
function streak(){
  const days = [...new Set(S.attempts.map(a=>a.date))].sort().reverse();
  if(!days.length) return 0;
  let n = 0; let d = new Date();
  if(days[0] !== todayStr()){ d.setDate(d.getDate()-1); }
  for(;;){
    const ds = d.toISOString().slice(0,10);
    if(days.includes(ds)){ n++; d.setDate(d.getDate()-1); } else break;
  }
  return n;
}

/* ---------- theme: light default, sun/moon toggle, persisted ---------- */
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  localStorage.setItem("blunderTrainerTheme", t);
  const m = document.querySelector('meta[name="theme-color"]');
  if(m) m.content = t === "dark" ? "#0E141B" : "#F4F2EB";
  const b = document.getElementById("theme-toggle");
  if(b) b.textContent = t === "dark" ? "☀️" : "🌙";
}
function toggleTheme(){
  applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
}
applyTheme(localStorage.getItem("blunderTrainerTheme") || "light");

/* ---------- iOS external-link escape (open chess.com in real Safari) ---------- */
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
function extHref(url){ return IS_IOS ? url.replace(/^https:\/\//,"x-safari-https://") : url; }

/* ---------- drill ordering ----------
   1. due reviews first (spaced repetition — misses come back soonest)
   2. then unseen positions, weakest theme first, shuffled within theme
   3. then everything else, by next due date */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function buildQueue(filterTheme){
  let pool = DRILLS.map((d,i)=>({d,i}));
  if(filterTheme) pool = pool.filter(x=>x.d.theme===filterTheme);
  const today = todayStr();
  const rank = t => { const r = ANALYSIS.themeOrder.indexOf(t); return r<0 ? 99 : r; };
  const due = [], unseen = [], later = [];
  pool.forEach(x=>{
    const s = S.srs[x.d.key];
    if(!s) unseen.push(x);
    else if(s.due <= today) due.push(x);
    else later.push(x);
  });
  shuffle(due);
  const groups = {};
  unseen.forEach(x=>{ (groups[x.d.theme] = groups[x.d.theme]||[]).push(x); });
  let unseenOrdered = [];
  Object.keys(groups).sort((a,b)=>rank(a)-rank(b)).forEach(t=>{
    unseenOrdered = unseenOrdered.concat(shuffle(groups[t]));
  });
  later.sort((a,b)=> (S.srs[a.d.key].due < S.srs[b.d.key].due ? -1 : 1));
  return due.concat(unseenOrdered, later);
}

/* ============================================================
   Drill engine
   ============================================================ */
let Q = [], qPos = 0, game = null, drill = null, drillIdx = -1;
let selSq = null, solved = false, failed = false, hintUsed = false, triedOnce = false, tries = 0;
const MAX_TRIES = 3;
let sessCorrect = 0, sessTotal = 0;

function startDrills(filterTheme){
  Q = buildQueue(filterTheme); qPos = 0; sessCorrect = 0; sessTotal = 0;
  switchTab("drill");
  if(Q.length) loadDrill(); else renderDrillEmpty(filterTheme);
}
function loadDrill(){
  const item = Q[qPos];
  drill = item.d; drillIdx = item.i;
  game = new Chess(drill.fen);
  selSq = null; solved = false; failed = false; hintUsed = false; triedOnce = false; tries = 0;
  renderDrill();
}
function sqName(file, rank){ return "abcdefgh"[file] + (rank+1); }

function orientation(){ return drill.color === "White" ? "w" : "b"; }

function renderBoard(highlights){
  highlights = highlights || {};
  const flip = orientation() === "b";
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";
  for(let row=0; row<8; row++){
    for(let col=0; col<8; col++){
      const file = flip ? 7-col : col;
      const rank = flip ? row : 7-row;
      const name = sqName(file, rank);
      const sq = document.createElement("div");
      sq.className = "sq " + (((file+rank)%2===0) ? "dark" : "light");
      sq.dataset.sq = name;
      const piece = game.get(name);
      if(piece){
        const NS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(NS, "svg");
        svg.setAttribute("viewBox", "0 0 45 45");
        svg.setAttribute("class", "pc" + (highlights.animateTo === name ? " pop" : ""));
        const use = document.createElementNS(NS, "use");
        use.setAttributeNS("http://www.w3.org/1999/xlink", "href", "#pc-" + piece.color + piece.type);
        svg.appendChild(use);
        sq.appendChild(svg);
      }
      // edge coordinates: file letters on the bottom row, rank numbers on the left column
      if(row === 7){
        const c = document.createElement("span");
        c.className = "coord file"; c.textContent = "abcdefgh"[file];
        sq.appendChild(c);
      }
      if(col === 0){
        const c = document.createElement("span");
        c.className = "coord rank"; c.textContent = rank + 1;
        sq.appendChild(c);
      }
      if(highlights.sel === name) sq.classList.add("sel");
      if(highlights.lastFrom === name || highlights.lastTo === name) sq.classList.add("lastmove");
      if(highlights.bestDest === name) sq.classList.add("best-dest");
      if(highlights.myFrom === name || highlights.myTo === name) sq.classList.add("mymove");
      if(highlights.moves && highlights.moves.includes(name)){
        const dot = document.createElement("div"); dot.className = "dot";
        if(game.get(name)) sq.classList.add("cap-target");
        sq.appendChild(dot);
      }
      sq.addEventListener("click", ()=>onSquareClick(name));
      boardEl.appendChild(sq);
    }
  }
}

function onSquareClick(name){
  if(solved || failed || showingMyMove) return;
  const piece = game.get(name);
  const myColor = orientation();
  if(selSq){
    const legal = game.moves({square: selSq, verbose: true});
    const mv = legal.find(m=>m.to===name);
    if(mv){
      makeUserMove(selSq, name);
      return;
    }
  }
  if(piece && piece.color === myColor){
    selSq = name;
    const dests = game.moves({square: name, verbose: true}).map(m=>m.to);
    renderBoard({sel: name, moves: dests});
  } else {
    selSq = null;
    renderBoard({});
  }
}

let showingMyMove = false;
function showMyMove(){
  if(solved || failed || showingMyMove) return;
  showingMyMove = true;
  selSq = null;
  const from = drill.playedUci.slice(0,2), to = drill.playedUci.slice(2,4);
  game.move({from, to, promotion:"q"});
  renderBoard({myFrom: from, myTo: to, animateTo: to});
  const btn = document.getElementById("show-my-move");
  if(btn) btn.disabled = true;
  setTimeout(()=>{
    game.undo();
    showingMyMove = false;
    renderBoard({});
    const b = document.getElementById("show-my-move");
    if(b) b.disabled = false;
  }, 1500);
}

function makeUserMove(from, to){
  const bestFrom = drill.bestUci.slice(0,2), bestTo = drill.bestUci.slice(2,4);
  const isBest = (from===bestFrom && to===bestTo);
  const accepted = (drill.accept || [drill.bestUci]).some(u => u.slice(0,2)===from && u.slice(2,4)===to);
  const firstTry = !triedOnce;
  triedOnce = true;
  selSq = null;
  if(isBest || accepted){
    const mv = game.move({from, to, promotion:"q"});
    solved = true;
    if(firstTry){ sessTotal++; sessCorrect++; }
    recordAttempt(drill.key, drill.theme, true, firstTry);
    const tryNote = firstTry ? "" : " (try " + (tries+1) + ")";
    const verdict = isBest
      ? "✅ " + drill.best + " — exactly right" + tryNote + (hintUsed ? " (with a hint)" : "") + "."
      : "✅ " + (mv ? mv.san : "") + " works too — also winning" + tryNote + ". Engine's top pick: " + drill.best + ".";
    renderDrill({lastFrom: from, lastTo: to, bestDest: to, animateTo: to}, {
      kind:"good",
      verdict,
      body: drill.explanation
    });
  } else {
    const userMove = game.move({from, to, promotion:"q"});
    const userSan = userMove ? userMove.san : (from+"–"+to);
    game.undo();
    tries++;
    if(firstTry){ sessTotal++; recordAttempt(drill.key, drill.theme, false, true); }
    if(tries < MAX_TRIES){
      // tries left — keep the board live, don't reveal
      renderDrill({lastFrom: from, lastTo: to}, {
        kind:"bad",
        verdict:"❌ " + userSan + " — not it. Try " + (tries+1) + " of " + MAX_TRIES + ".",
        body: tries === MAX_TRIES-1 ? "Last try — use the hint if you need it." : "Look again. What does your opponent threaten, and what's undefended?"
      });
      return;
    }
    failed = true;
    // out of tries — animate the correct move onto the board after a beat
    renderDrill({lastFrom: from, lastTo: to}, {
      kind:"bad",
      verdict:"❌ " + userSan + " — out of tries.",
      body:"Watch the right idea…"
    });
    setTimeout(()=>{
      game.move({from: bestFrom, to: bestTo, promotion:"q"});
      renderDrill({lastFrom: bestFrom, lastTo: bestTo, bestDest: bestTo, animateTo: bestTo}, {
        kind:"bad",
        verdict:"❌ The move was " + drill.best + ".",
        body: drill.explanation
      });
    }, 850);
  }
}

function showHint(){
  hintUsed = true;
  document.getElementById("hint-line").innerHTML =
    '💡 Hint: move your <strong>' + drill.hintPiece + '</strong>.';
}
function retryDrill(){
  game = new Chess(drill.fen);
  selSq = null; solved = false; failed = false; tries = 0;
  renderDrill();
}
function nextDrill(){
  qPos++;
  if(qPos >= Q.length){
    renderDrillDone();
  } else {
    loadDrill();
  }
}

function renderDrill(extraHl, feedback){
  const el = document.getElementById("tab-drill");
  const sessAcc = sessTotal ? Math.round(100*sessCorrect/sessTotal) : null;
  el.innerHTML = `
    <div class="card">
      <div class="drill-ctx">
        <div class="opening">${esc(drill.opening)} · ${esc(drill.date)} · you were <strong style="color:var(--text)">${drill.color}</strong>
          ${drill.link ? ` · <a href="${extHref(drill.link)}" target="_blank" rel="noopener">game ↗</a>` : ""}</div>
        <div class="task">You played: <strong class="mono">${esc(drill.played)}</strong>. Find the best move.<span class="tries">${Array.from({length: MAX_TRIES}, (_,i)=>`<span class="pip ${i<tries?"used":""}"></span>`).join("")}</span></div>
        <div id="hint-line" style="margin-top:6px; font-size:.9rem; color:var(--blue);"></div>
      </div>
      <div id="board-wrap">
        <div id="board"></div>
        <div class="board-meta"><span>move ${drill.moveNum} · ${drill.color === "White" ? "White" : "Black"} to play</span></div>
      </div>
      <div id="feedback-zone"></div>
      <div class="drill-actions" id="drill-actions"></div>
      <div class="drill-foot">
        <span class="badge">${THEME_ICONS[drill.theme]||"♟"} ${esc(drill.theme)}</span>
        <span class="badge ${drill.difficulty==="Hard"?"coral":""}">${drill.difficulty}</span>
        <span class="badge coral">−${drill.swing} eval swing</span>
        <span class="spacer"></span>
        <span>Drill ${qPos+1} of ${Q.length} · Session accuracy: ${sessAcc===null?"—":sessAcc+"%"}</span>
      </div>
    </div>`;
  renderBoard(extraHl||{});
  const fz = document.getElementById("feedback-zone");
  if(feedback){
    fz.innerHTML = `<div class="feedback ${feedback.kind}">
      <div class="verdict">${feedback.verdict}</div><div>${esc(feedback.body)}</div></div>`;
  }
  const act = document.getElementById("drill-actions");
  if(solved){
    act.innerHTML = `<button class="btn" onclick="nextDrill()">Next Drill →</button>`;
  } else if(failed){
    act.innerHTML = `<button class="btn ghost" onclick="retryDrill()">Try Again</button>
                     <button class="btn" onclick="nextDrill()">Next Drill →</button>`;
  } else {
    act.innerHTML = `<button class="btn ghost" id="show-my-move" onclick="showMyMove()">👁 Show My Move</button>
                     <button class="btn ghost" onclick="showHint()">Show Hint</button>`;
  }
}
function renderDrillDone(){
  const acc = sessTotal ? Math.round(100*sessCorrect/sessTotal) : 0;
  document.getElementById("tab-drill").innerHTML = `
    <div class="card" style="text-align:center; padding:40px 20px;">
      <div style="font-size:2.4rem;">🏁</div>
      <h2 style="margin-top:10px;">Session complete</h2>
      <p style="color:var(--muted); margin-top:6px;">${sessCorrect} / ${sessTotal} first-try correct — ${acc}%</p>
      <div style="margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn" onclick="startDrills()">Run It Back</button>
        <button class="btn ghost" onclick="switchTab('progress')">See Progress</button>
      </div>
    </div>`;
}
function renderDrillEmpty(theme){
  document.getElementById("tab-drill").innerHTML = `
    <div class="card" style="text-align:center; padding:40px;">
      <p>No drills available${theme ? " for "+esc(theme) : ""}.</p>
      <button class="btn" style="margin-top:14px;" onclick="startDrills()">Drill Everything</button>
    </div>`;
}

/* ============================================================
   Dashboard
   ============================================================ */
function renderDashboard(){
  const acc = overallAccuracy();
  const today = todayStr();
  const dueCount = DRILLS.filter(d => S.srs[d.key] && S.srs[d.key].due <= today).length;
  const newCount = DRILLS.filter(d => !S.srs[d.key]).length;
  document.getElementById("tab-dashboard").innerHTML = `
    <div class="grid stat-grid">
      <div class="card stat"><div class="num">${ANALYSIS.gamesAnalyzed}</div><div class="lbl">Games analyzed</div></div>
      <div class="card stat"><div class="num">${ANALYSIS.totalBlunders}</div><div class="lbl">Blunders → drills</div></div>
      <div class="card stat"><div class="num">${acc===null?"—":acc+"%"}</div><div class="lbl">Drill accuracy</div></div>
      <div class="card stat"><div class="num flame">${streak()}🔥</div><div class="lbl">Day streak</div></div>
    </div>
    <div class="card" style="margin-top:14px;">
      <h2>Where your games are leaking</h2>
      <p style="line-height:2.1;">
        Most common blunder: <span class="badge coral">${THEME_ICONS[ANALYSIS.topTheme]||"♟"} ${esc(ANALYSIS.topTheme)} — ${ANALYSIS.topThemeCount} positions</span><br>
        Weakest opening: <span class="badge coral">♟ ${esc(ANALYSIS.weakestOpening)}</span><br>
        Danger zone: <span class="badge">moves 11–25 (${ANALYSIS.midgamePct}% of your blunders)</span>
      </p>
      <p style="color:var(--muted); margin-top:10px; font-size:.9rem; line-height:1.6;">
        Every position came from a real game you played, analyzed with Stockfish at depth ${14}.
        ${dueCount ? `<strong style="color:var(--gold)">${dueCount} review${dueCount>1?"s":""} due today</strong> — misses come back until you own them.` : ""}
        ${newCount ? ` ${newCount} positions you haven't drilled yet.` : ""}
      </p>
      <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" onclick="startDrills()">Start Today's Drill${dueCount ? ` (${dueCount} due)` : ""}</button>
        <button class="btn ghost" onclick="switchTab('themes')">Review All Themes</button>
      </div>
      ${ANALYSIS.generated ? `<p style="color:var(--muted); font-size:.75rem; margin-top:14px;" class="mono">drill bank updated ${esc(ANALYSIS.generated)} · syncs automatically as you play</p>` : ""}
    </div>`;
}

/* ============================================================
   Themes library
   ============================================================ */
function renderThemes(){
  const themes = {};
  DRILLS.forEach(d=>{ themes[d.theme] = (themes[d.theme]||0)+1; });
  const rank = t => { const r = ANALYSIS.themeOrder.indexOf(t); return r<0?99:r; };
  const cards = Object.keys(themes).sort((a,b)=>rank(a)-rank(b)).map(t=>{
    const acc = themeAccuracy(t);
    return `<div class="card theme-card" onclick="startDrills('${t.replace(/'/g,"\\'")}')">
      <div class="ico">${THEME_ICONS[t]||"♟"}</div>
      <h3>${esc(t)}</h3>
      <div class="meta">
        <span class="acc">${acc===null?"— not drilled yet":acc+"% accuracy"}</span><br>
        ${themes[t]} position${themes[t]>1?"s":""} from your games
      </div>
    </div>`;
  }).join("");
  document.getElementById("tab-themes").innerHTML = `
    <p style="color:var(--muted); font-size:.88rem; margin-bottom:14px;">Tap a theme to drill only those positions — ordered by how often each one costs you games.</p>
    <div class="grid theme-grid">${cards}</div>`;
}

/* ============================================================
   Progress (hand-rolled SVG charts)
   ============================================================ */
function renderProgress(){
  const el = document.getElementById("tab-progress");
  const sessions = S.sessions.filter(s=>s.total>0);
  // line chart: accuracy per session
  let line = `<p style="color:var(--muted);">No sessions yet — run a drill first.</p>`;
  if(sessions.length){
    const W=560,H=180,P=30;
    const pts = sessions.map((s,i)=>{
      const x = P + (sessions.length===1 ? (W-2*P)/2 : i*(W-2*P)/(sessions.length-1));
      const y = H-P - (s.correct/s.total)*(H-2*P);
      return {x,y,acc:Math.round(100*s.correct/s.total)};
    });
    const path = pts.map((p,i)=>(i?"L":"M")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
    line = `<svg viewBox="0 0 ${W} ${H}" style="width:100%; max-width:${W}px;">
      ${[0,50,100].map(v=>{const y=H-P-(v/100)*(H-2*P);
        return `<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="#2A2E3D"/><text x="4" y="${y+3}">${v}%</text>`;}).join("")}
      <path d="${path}" fill="none" stroke="#81B64C" stroke-width="2.5"/>
      ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#81B64C"/>
        <text x="${p.x-8}" y="${p.y-9}">${p.acc}%</text>
        <text x="${p.x-6}" y="${H-8}">s${i+1}</text>`).join("")}
    </svg>`;
  }
  // bar chart: drills completed by theme
  const byTheme = {};
  S.attempts.filter(a=>a.firstTry).forEach(a=>{ byTheme[a.theme]=(byTheme[a.theme]||0)+1; });
  const tkeys = Object.keys(byTheme);
  let bars = `<p style="color:var(--muted);">Nothing drilled yet.</p>`;
  if(tkeys.length){
    const W=560, BH=26, P=120, H=tkeys.length*(BH+10)+10;
    const max = Math.max(...tkeys.map(t=>byTheme[t]));
    bars = `<svg viewBox="0 0 ${W} ${H}" style="width:100%; max-width:${W}px;">
      ${tkeys.map((t,i)=>{
        const y=i*(BH+10)+5, w=(byTheme[t]/max)*(W-P-50);
        return `<text x="0" y="${y+BH/2+4}">${t.length>16?t.slice(0,15)+"…":t}</text>
          <rect x="${P}" y="${y}" width="${Math.max(w,2)}" height="${BH}" rx="5" fill="#F5A623" opacity=".85"/>
          <text x="${P+w+8}" y="${y+BH/2+4}" style="fill:#E8E8F0;">${byTheme[t]}</text>`;
      }).join("")}
    </svg>`;
  }
  // weakest theme this week
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  const recent = S.attempts.filter(a=>a.firstTry && a.date >= weekAgo.toISOString().slice(0,10));
  const wkTheme = {};
  recent.forEach(a=>{ const o = wkTheme[a.theme]=wkTheme[a.theme]||{c:0,t:0}; o.t++; if(a.correct)o.c++; });
  let weakest = null, weakAcc = 101;
  Object.keys(wkTheme).forEach(t=>{ const a=100*wkTheme[t].c/wkTheme[t].t; if(wkTheme[t].t>=2 && a<weakAcc){weakAcc=a; weakest=t;} });
  el.innerHTML = `
    <div class="grid stat-grid">
      <div class="card stat"><div class="num flame">${streak()}🔥</div><div class="lbl">Day streak</div></div>
      <div class="card stat"><div class="num">${S.attempts.filter(a=>a.firstTry).length}</div><div class="lbl">Drills attempted</div></div>
      <div class="card stat"><div class="num">${overallAccuracy()===null?"—":overallAccuracy()+"%"}</div><div class="lbl">Overall accuracy</div></div>
    </div>
    <div class="card chart-card" style="margin-top:14px;"><h2>Session accuracy over time</h2>${line}</div>
    <div class="card chart-card" style="margin-top:14px;"><h2>Drills completed by theme</h2>${bars}</div>
    ${weakest ? `<div class="card" style="margin-top:14px; border-color:rgba(224,87,63,.5);">
      <h2>⚠ Weakest theme this week: ${THEME_ICONS[weakest]||""} ${esc(weakest)} (${Math.round(weakAcc)}%)</h2>
      <button class="btn coral" style="margin-top:8px;" onclick="startDrills('${weakest.replace(/'/g,"\\'")}')">Drill ${esc(weakest)} now</button>
    </div>` : ""}`;
}

/* ============================================================
   Tabs + boot
   ============================================================ */
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function switchTab(name){
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active", b.dataset.tab===name));
  ["dashboard","drill","themes","progress"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("hidden", t!==name);
  });
  if(name==="dashboard") renderDashboard();
  if(name==="themes") renderThemes();
  if(name==="progress") renderProgress();
  if(name==="drill" && !Q.length){ startDrills(); }
}
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click", ()=>switchTab(b.dataset.tab)));
boot();
</script>
</body>
</html>
